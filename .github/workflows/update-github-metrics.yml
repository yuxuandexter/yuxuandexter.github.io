name: Update GitHub Metrics

on:
  schedule:
    - cron: "24 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update_github_metrics.js

      - name: Commit changes
        run: |
          if git diff --quiet -- _data/github_metrics.yml; then
            echo "No metrics changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/github_metrics.yml
          git commit -m "Update GitHub metrics"
          git push
